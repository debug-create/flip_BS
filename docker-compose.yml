services:
  backend:
    build:
      context: ./drishti-backend
    ports:
      - "8000:8000"
    env_file:
      - ./drishti-backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./sightline-command-main
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
